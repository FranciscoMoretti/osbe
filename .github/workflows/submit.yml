name: "Submit to Web Store"
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/submit.yml"
      - "extensions/markdown-clipper/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "packages/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: submit-markdown-clipper
  cancel-in-progress: false

jobs:
  markdown-clipper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Markdown Clipper
        run: pnpm --filter @osbe/markdown-clipper build
      - name: Package Markdown Clipper into a zip artifact
        run: pnpm --filter @osbe/markdown-clipper package
      - name: Browser Platform Publish
        uses: PlasmoHQ/bpp@v3
        with:
          keys: ${{ secrets.SUBMIT_KEYS }}
          artifact: extensions/markdown-clipper/build/chrome-mv3-prod.zip
