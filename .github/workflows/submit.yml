name: "Submit Markdown Clipper to Web Store"

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/_submit-extension.yml"
      - ".github/workflows/submit.yml"
      - "extensions/catalog.json"
      - "extensions/markdown-clipper/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "packages/**"
  workflow_dispatch:

concurrency:
  group: submit-markdown-clipper
  cancel-in-progress: false

jobs:
  submit:
    uses: ./.github/workflows/_submit-extension.yml
    with:
      extension: markdown-clipper
    secrets:
      submit_keys: ${{ secrets.SUBMIT_KEYS }}
