name: "Submit Site Blocker to Web Store"

on:
  workflow_dispatch:

concurrency:
  group: submit-site-blocker
  cancel-in-progress: false

jobs:
  submit:
    uses: ./.github/workflows/_submit-extension.yml
    with:
      extension: site-blocker
    secrets:
      submit_keys: ${{ secrets.SITE_BLOCKER_SUBMIT_KEYS }}
